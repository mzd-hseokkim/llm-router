apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-gateway.fullname" . }}-config
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
data:
  config.yaml: |
    gateway:
      port: 8080
      drain_timeout: 30s
    log:
      level: {{ .Values.config.logLevel }}
      format: {{ .Values.config.logFormat }}
    database:
      url: ""          # Overridden by DATABASE_URL env var
      max_connections: 20
    redis:
      addr: ""         # Overridden by REDIS_ADDR env var
    routing:
      default_provider: openai
      default_model: gpt-4o-mini
      circuit_breaker:
        failure_threshold: 5
        success_threshold: 2
        open_timeout: 30s
