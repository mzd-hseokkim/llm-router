{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-gateway.fullname" . }}-secret
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL:   {{ .Values.secrets.databaseURL | quote }}
  REDIS_ADDR:     {{ .Values.secrets.redisAddr | quote }}
  MASTER_KEY:     {{ .Values.secrets.masterKey | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  OPENAI_API_KEY:    {{ .Values.providers.openai.apiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.providers.anthropic.apiKey | quote }}
  GEMINI_API_KEY:    {{ .Values.providers.gemini.apiKey | quote }}
{{- end }}
