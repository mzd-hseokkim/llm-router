server:
  port: 8080
  read_timeout: 30s
  write_timeout: 60s

database:
  url: "postgres://llmrouter:llmrouter@localhost:5433/llmrouter?sslmode=disable"
  max_connections: 20

redis:
  addr: "localhost:6380"

log:
  level: "info"
  format: "text"

# Provider API keys.
# Prefer setting via env vars: OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY
providers:
  openai:
    api_key: ""
  anthropic:
    api_key: ""
  gemini:
    api_key: ""

  # Self-hosted inference servers (Ollama, vLLM, TGI, LMStudio).
  # Uncomment and configure to enable local model routing.
  # self_hosted:
  #   - name: ollama_local
  #     engine: ollama
  #     base_url: http://localhost:11434
  #     models:
  #       - id: "ollama/llama3.2:3b"
  #         model_name: "llama3.2:3b"
  #         context_window: 131072
  #   - name: vllm_cluster
  #     engine: vllm
  #     base_url: http://vllm-service:8000
  #     models:
  #       - id: "vllm/llama3.1-8b"
  #         model_name: "meta-llama/Llama-3.1-8B-Instruct"
  #         context_window: 131072

# Gateway configuration.
# Set master_key via env var MASTER_KEY (never commit real keys).
# Set encryption_key via env var ENCRYPTION_KEY (32-byte base64, required for DB provider key storage).
gateway:
  master_key: "admin123"
  encryption_key: "FwKMSJ7QxqhEGz2Rp4NlVcDOvbIaHf8Xkn3YeJmTuWs="

guardrails:
  llm_judge:
    model: claude-haiku-4-5-20251001
    # api_key: ""  # 비워두면 providers.anthropic.api_key 사용
  pii:
    enabled: true
    action: mask        # block | mask | log_only
    # categories 생략 시 전체 활성화 (credit_card, ssn, email, phone_us, ip_address, korean_rrn)
  prompt_injection:
    enabled: false
    action: block
    engine: llm         # regex | llm
  content_filter:
    enabled: false
    action: block
    engine: llm         # regex | llm
  custom_keywords:
    enabled: false
    action: block
    blocked: []
