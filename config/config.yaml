server:
  port: 8080
  read_timeout: 30s
  write_timeout: 60s

database:
  url: "postgres://llmrouter:llmrouter@localhost:5433/llmrouter?sslmode=disable"
  max_connections: 20

redis:
  addr: "localhost:6380"

log:
  level: "info"
  format: "text"

# Provider API keys.
# Prefer setting via env vars: OPENAI_API_KEY, ANTHROPIC_API_KEY, GEMINI_API_KEY
providers:
  openai:
    api_key: ""
  anthropic:
    api_key: ""
  gemini:
    api_key: ""

  # Self-hosted inference servers (Ollama, vLLM, TGI, LMStudio).
  # Uncomment and configure to enable local model routing.
  # self_hosted:
  #   - name: ollama_local
  #     engine: ollama
  #     base_url: http://localhost:11434
  #     models:
  #       - id: "ollama/llama3.2:3b"
  #         model_name: "llama3.2:3b"
  #         context_window: 131072
  #   - name: vllm_cluster
  #     engine: vllm
  #     base_url: http://vllm-service:8000
  #     models:
  #       - id: "vllm/llama3.1-8b"
  #         model_name: "meta-llama/Llama-3.1-8B-Instruct"
  #         context_window: 131072

# Gateway configuration.
# Set master_key via env var MASTER_KEY (never commit real keys).
# Set encryption_key via env var ENCRYPTION_KEY (32-byte base64, required for DB provider key storage).
gateway:
  master_key: "admin123"
  encryption_key: "FwKMSJ7QxqhEGz2Rp4NlVcDOvbIaHf8Xkn3YeJmTuWs="

# Guardrail policies are managed in the database (guardrail_policies table).
# Configure them at runtime via the Admin UI (/guardrails) or Admin API.
# LLM-based guardrails use providers.anthropic.api_key above.
